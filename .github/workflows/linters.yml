name: linters

on:

  push:
    paths-ignore:
      - .run/
      - .coveragerc
      - .gitignore
      - CHANGELOG.md
      - CONTRIBUTING.md
      - LICENSE
      - mkdocs.yml
      - README.md
      - .github/workflows/deploy-mkdocs-poetry.yml
      - .github/workflows/publish.yml
      - .github/workflows/tests.yml
      - .github/workflows/traffic2badge.yml
      - .github/FUNDING.yml

  pull_request:
    paths-ignore:
      - .run/
      - .coveragerc
      - .gitignore
      - CHANGELOG.md
      - CONTRIBUTING.md
      - LICENSE
      - mkdocs.yml
      - README.md
      - .github/workflows/deploy-mkdocs-poetry.yml
      - .github/workflows/publish.yml
      - .github/workflows/tests.yml
      - .github/workflows/traffic2badge.yml
      - .github/FUNDING.yml

jobs:

  Black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - run: |
          pip install tomli
          # Keep CI in sync with local Poetry env:
          # read black version from poetry.lock and install only that package via pip.
          BLACK_VERSION=$(python .run/get_lock_version.py black)
          pip install "black==$BLACK_VERSION"
          .run/lint_black.sh

  Pycodestyle:
    name: Lint Pycodestyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Pycodestyle
        run: |
          pip install tomli
          PYCODESTYLE_VERSION=$(python .run/get_lock_version.py pycodestyle)
          pip install "pycodestyle==$PYCODESTYLE_VERSION"
          .run/lint_pycodestyle.sh

  Pylint:
    name: Lint Pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Pylint
        run: |
          pip install tomli
          PYLINT_VERSION=$(python .run/get_lock_version.py pylint)
          pip install "pylint==$PYLINT_VERSION"
          .run/lint_pylint.sh

  Pylint-full-report:
    name: Lint Pylint Full Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Pylint Full Report
        run: |
          pip install tomli
          PYLINT_VERSION=$(python .run/get_lock_version.py pylint)
          pip install "pylint==$PYLINT_VERSION"
          touch __init__.py
          pylint $(pwd) --disable="" --ignore-patterns=.venv --exit-zero
          rm __init__.py

  Mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Mypy
        run: |
          pip install tomli
          # Keep CI in sync with local Poetry env:
          # read mypy version from poetry.lock and install only that package via pip.
          MYPY_VERSION=$(python .run/get_lock_version.py mypy)
          pip install "mypy==$MYPY_VERSION"
          .run/lint_mypy.sh
