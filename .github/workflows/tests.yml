name: tests

on:
  workflow_dispatch:
  push:
    paths:
      - "selene/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "selene/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/tests.yml"

jobs:
  regression:
    name: Regression (blocking) / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    env:
      DISPLAY: ":99"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with dev

      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &

      - name: Regression tests
        run: |
          poetry run pytest -sv \
            --cov-config .coveragerc \
            --cov-branch \
            --cov-report html:skip-covered \
            --cov-report term:skip-covered \
            --cov=selene \
            --cov-report xml:coverage.xml \
            --tb=short \
            -m "not (clipboard or speed or remote or flaky)" \
            tests/ \
            --headless=True

      - name: Build package-slice coverage reports
        if: matrix.python-version == '3.10' && always()
        run: |
          poetry run coverage xml -i --include="selene/core/*" -o coverage-core.xml
          poetry run coverage xml -i --include="selene/common/*" -o coverage-common.xml
          poetry run coverage xml -i --include="selene/support/*" -o coverage-support.xml
          poetry run coverage xml -i --include="selene/api/*" -o coverage-api.xml

      - name: Unit tests coverage report
        if: matrix.python-version == '3.10' && always()
        run: |
          COVERAGE_FILE=.coverage.unit poetry run pytest -sv \
            --cov-config .coveragerc \
            --cov-branch \
            --cov=selene \
            --cov-report= \
            --tb=short \
            -m "not (clipboard or speed or remote or flaky)" \
            tests/unit \
            --headless=True
          COVERAGE_FILE=.coverage.unit poetry run coverage xml -i -o coverage-unit.xml

      - name: Integration tests coverage report
        if: matrix.python-version == '3.10' && always()
        run: |
          COVERAGE_FILE=.coverage.integration poetry run pytest -sv \
            --cov-config .coveragerc \
            --cov-branch \
            --cov=selene \
            --cov-report= \
            --tb=short \
            -m "not (clipboard or speed or remote or flaky)" \
            tests/integration \
            --headless=True
          COVERAGE_FILE=.coverage.integration poetry run coverage xml -i -o coverage-integration.xml

      - name: Acceptance tests coverage report
        if: matrix.python-version == '3.10' && always()
        run: |
          COVERAGE_FILE=.coverage.acceptance poetry run pytest -sv \
            --cov-config .coveragerc \
            --cov-branch \
            --cov=selene \
            --cov-report= \
            --tb=short \
            -m "not (clipboard or speed or remote or flaky)" \
            tests/acceptance \
            --headless=True
          COVERAGE_FILE=.coverage.acceptance poetry run coverage xml -i -o coverage-acceptance.xml

      - name: Code Coverage (selene)
        if: matrix.python-version == '3.10' && always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: regression
          name: regression-py310
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Code Coverage (core)
        if: matrix.python-version == '3.10' && always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-core.xml
          flags: core
          name: core-py310
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Code Coverage (common)
        if: matrix.python-version == '3.10' && always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-common.xml
          flags: common
          name: common-py310
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Code Coverage (support)
        if: matrix.python-version == '3.10' && always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-support.xml
          flags: support
          name: support-py310
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Code Coverage (api)
        if: matrix.python-version == '3.10' && always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-api.xml
          flags: api
          name: api-py310
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Code Coverage (unit)
        if: matrix.python-version == '3.10' && always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-unit.xml
          flags: unit
          name: unit-py310
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Code Coverage (integration)
        if: matrix.python-version == '3.10' && always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-integration.xml
          flags: integration
          name: integration-py310
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Code Coverage (acceptance)
        if: matrix.python-version == '3.10' && always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-acceptance.xml
          flags: acceptance
          name: acceptance-py310
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  clipboard:
    name: Clipboard (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISPLAY: ":99"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Install xvfb and xclip
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xclip
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
      - name: Clipboard tests
        run: poetry run pytest -sv --tb=short -m "clipboard" tests/ --headless=True

  speed:
    name: Speed (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISPLAY: ":99"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
      - name: Speed tests
        run: poetry run pytest -sv --tb=short -m "speed" tests/ --headless=True

  remote:
    name: Remote (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISPLAY: ":99"
      selenoid_login: ${{ secrets.SELENOID_LOGIN }}
      selenoid_password: ${{ secrets.SELENOID_PASSWORD }}
    steps:
      - name: Check remote credentials
        id: check_remote
        run: |
          if [ -n "${selenoid_login}" ] && [ -n "${selenoid_password}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Remote tests are skipped: SELENOID credentials are missing."
          fi
      - uses: actions/checkout@v5
        if: steps.check_remote.outputs.enabled == 'true'
      - uses: actions/setup-python@v6
        if: steps.check_remote.outputs.enabled == 'true'
        with:
          python-version: "3.10"
      - name: Install dependencies
        if: steps.check_remote.outputs.enabled == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Remote tests
        if: steps.check_remote.outputs.enabled == 'true'
        run: poetry run pytest -sv --tb=short -m "remote" tests/ --headless=True
