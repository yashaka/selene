name: tests

on:
  push:
    paths-ignore:
      - .run/
      - examples/
      - .coveragerc
      - .gitignore
      - .pylint-disabled-rules
      - CHANGELOG.md
      - CONTRIBUTING.md
      - LICENSE
      - mkdocs.yml
      - README.md
      - .github/workflows/deploy-mkdocs-poetry.yml
      - .github/workflows/linters.yml
      - .github/workflows/publish.yml
      - .github/workflows/traffic2badge.yml
      - .github/FUNDING.yml
  pull_request:
    paths-ignore:
      - .run/
      - examples/
      - .coveragerc
      - .gitignore
      - .pylint-disabled-rules
      - CHANGELOG.md
      - CONTRIBUTING.md
      - LICENSE
      - mkdocs.yml
      - README.md
      - .github/workflows/deploy-mkdocs-poetry.yml
      - .github/workflows/linters.yml
      - .github/workflows/publish.yml
      - .github/workflows/traffic2badge.yml
      - .github/FUNDING.yml

jobs:
  regression:
    name: Regression (blocking)
    runs-on: ubuntu-latest
    env:
      DISPLAY: ":99"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
      - name: Regression tests
        run: |
          poetry run pytest -sv \
            --cov-config .coveragerc \
            --cov-report html:skip-covered \
            --cov-report term:skip-covered \
            --cov=selene \
            --cov-report xml:coverage.xml \
            --tb=short \
            -m "not (clipboard or speed or remote or flaky)" \
            tests/ \
            --headless=True
      - name: Code Coverage
        uses: codecov/codecov-action@v4.5.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  clipboard:
    name: Clipboard (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISPLAY: ":99"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Install xvfb and xclip
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xclip
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
      - name: Clipboard tests
        run: poetry run pytest -sv --tb=short -m "clipboard" tests/ --headless=True

  speed:
    name: Speed (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISPLAY: ":99"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
      - name: Speed tests
        run: poetry run pytest -sv --tb=short -m "speed" tests/ --headless=True

  remote:
    name: Remote (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ secrets.SELENOID_LOGIN != '' && secrets.SELENOID_PASSWORD != '' }}
    env:
      DISPLAY: ":99"
      selenoid_login: ${{ secrets.SELENOID_LOGIN }}
      selenoid_password: ${{ secrets.SELENOID_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Remote tests
        run: poetry run pytest -sv --tb=short -m "remote" tests/ --headless=True
