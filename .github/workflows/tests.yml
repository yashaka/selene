name: tests

on:
  workflow_dispatch:
  push:
    paths:
      - "selene/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "selene/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/tests.yml"

jobs:
  regression:
    name: Regression (blocking) / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    env:
      DISPLAY: ":99"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with dev

      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &

      - name: Regression tests
        run: |
          poetry run pytest -sv \
            --cov-config .coveragerc \
            --cov-report html:skip-covered \
            --cov-report term:skip-covered \
            --cov=selene \
            --cov-report xml:coverage.xml \
            --tb=short \
            -m "not (clipboard or speed or remote or flaky)" \
            tests/ \
            --headless=True

      - name: Code Coverage
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4.5.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  clipboard:
    name: Clipboard (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISPLAY: ":99"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Install xvfb and xclip
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xclip
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
      - name: Clipboard tests
        run: poetry run pytest -sv --tb=short -m "clipboard" tests/ --headless=True

  speed:
    name: Speed (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISPLAY: ":99"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
      - name: Speed tests
        run: poetry run pytest -sv --tb=short -m "speed" tests/ --headless=True

  remote:
    name: Remote (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISPLAY: ":99"
      selenoid_login: ${{ secrets.SELENOID_LOGIN }}
      selenoid_password: ${{ secrets.SELENOID_PASSWORD }}
    steps:
      - name: Check remote credentials
        id: check_remote
        run: |
          if [ -n "${selenoid_login}" ] && [ -n "${selenoid_password}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Remote tests are skipped: SELENOID credentials are missing."
          fi
      - uses: actions/checkout@v5
        if: steps.check_remote.outputs.enabled == 'true'
      - uses: actions/setup-python@v6
        if: steps.check_remote.outputs.enabled == 'true'
        with:
          python-version: "3.10"
      - name: Install dependencies
        if: steps.check_remote.outputs.enabled == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Remote tests
        if: steps.check_remote.outputs.enabled == 'true'
        run: poetry run pytest -sv --tb=short -m "remote" tests/ --headless=True
