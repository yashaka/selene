name: tests

on:
  workflow_dispatch:
  push:
    paths:
      - "selene/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "selene/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/tests.yml"

jobs:
  regression:
    name: Regression (blocking) / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]

    env:
      DISPLAY: ":99"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with dev

      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &

      - name: Clean old coverage artifacts
        run: |
          rm -f .coverage .coverage.* coverage*.xml

      - name: Regression tests
        run: |
          poetry run pytest -v \
            --cov-config .coveragerc \
            --cov-branch \
            --cov-report term:skip-covered \
            --cov=selene \
            --cov-report xml:coverage.xml \
            --tb=short \
            -m "not (clipboard or speed or remote or flaky)" \
            tests/ \
            --headless=True

      - name: Unit tests coverage report
        if: matrix.python-version == '3.10' && always()
        run: |
          COVERAGE_FILE=.coverage.unit poetry run pytest -sv \
            --cov-config .coveragerc \
            --cov-branch \
            --cov=selene \
            --cov-report= \
            --tb=short \
            -m "not (clipboard or speed or remote or flaky)" \
            tests/unit \
            --headless=True
          COVERAGE_FILE=.coverage.unit poetry run coverage xml -i -o coverage-unit.xml

      - name: Coverage summary for PR
        if: matrix.python-version == '3.10' && always()
        run: |
          {
            echo "## Coverage summary"
            echo ""
            echo "### Full selene (line + branch)"
            echo '```text'
            poetry run coverage report --data-file=.coverage --skip-covered
            echo '```'
            echo ""
            echo "#### unit"
            echo '```text'
            poetry run coverage report --data-file=.coverage.unit --skip-covered
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Code Coverage (selene)
        if: matrix.python-version == '3.10' && always()
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          disable_search: true
          flags: regression
          name: regression-py310
          fail_ci_if_error: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Code Coverage (unit)
        if: matrix.python-version == '3.10' && always()
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-unit.xml
          disable_search: true
          flags: unit
          name: unit-py310
          fail_ci_if_error: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  clipboard:
    name: Clipboard (non-blocking, disabled)
    if: ${{ false }}
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISPLAY: ":99"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Install xvfb and xclip
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xclip
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
      - name: Clipboard tests
        run: poetry run pytest -sv --tb=short -m "clipboard" tests/ --headless=True

  speed:
    name: Speed (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISPLAY: ":99"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
      - name: Speed tests
        run: poetry run pytest -sv --tb=short -m "speed" tests/ --headless=True

  remote:
    name: Remote (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISPLAY: ":99"
      selenoid_login: ${{ secrets.SELENOID_LOGIN }}
      selenoid_password: ${{ secrets.SELENOID_PASSWORD }}
    steps:
      - name: Check remote credentials
        id: check_remote
        run: |
          if [ -n "${selenoid_login}" ] && [ -n "${selenoid_password}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Remote tests are skipped: SELENOID credentials are missing."
          fi
      - uses: actions/checkout@v6
        if: steps.check_remote.outputs.enabled == 'true'
      - uses: actions/setup-python@v6
        if: steps.check_remote.outputs.enabled == 'true'
        with:
          python-version: "3.10"
      - name: Install dependencies
        if: steps.check_remote.outputs.enabled == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Remote tests
        if: steps.check_remote.outputs.enabled == 'true'
        run: poetry run pytest -sv --tb=short -m "remote" tests/ --headless=True
